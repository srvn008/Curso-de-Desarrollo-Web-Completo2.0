
<html>
    <head>
        <meta charset="utf-8">
        <title>CodePlayer</title>
        <script src="C:\Users\santi\OneDrive\Documentos\Curso de desarrollo web completo 2.0\5-JQuery\jquery.js">
        </script>
        <script src="C:\Users\santi\OneDrive\Documentos\Curso de desarrollo web completo 2.0\5-JQuery\jquery-ui-1.14.2\jquery-ui-1.14.2\jquery-ui.js"></script>
        <link rel="stylesheet" href="C:\Users\santi\OneDrive\Documentos\Curso de desarrollo web completo 2.0\5-JQuery\jquery-ui-1.14.2\jquery-ui-1.14.2\jquery-ui.css">
    
        <style type="text/css">
            body {
                font-family: sans-serif;
                padding:0;
                margin:0;
            }
            #barra {
                width:100%;
                background-color:#EEEEEE;
                padding:5px;
                height:30px;
            }
            #logo {
                float:left;
                font-weight:bold;
                font-size:120%;
                padding: 3px 5px;
            }
            #contenedorBotones {
                width:233px;
                margin:0 auto;
            }
            .boton {
                float:left;
                border: 1px solid grey;
                padding: 6px;
                border-right: none;
                font-size:90%;
            }
            #html {
                border-top-left-radius: 4px;
                border-bottom-left-radius: 4px;
            }
            #output {
                border-top-right-radius: 4px;
                border-bottom-right-radius: 4px;
                border-right:1px solid grey;
            }
            .activo { 
                background-color:#D4F2FF; //celeste
            }
            .botonMarcado { 
                background-color: grey;
            }
            /* A partir de 3 video */
            textarea {
                resize: none;
                border-top:none;
                border-color:grey;
            }
            .panel {
                float:left;
                width: 50%;
                border-left:none;
            }
            iframe {
                border:none;
            }
            /* Empieza aqui el 4º */
            .oculto {
                display: none;
            }
        </style>
    </head>
    
    <body>
        <div id="barra">
            <div id="logo">CodePlayer</div>
            <div id="contenedorBotones">
                <div class="boton activo" id="html">HTML</div>
                <div class="boton" id="css">CSS</div>
                <div class="boton" id="javascript">JavaScript</div>
                <div class="boton activo" id="output">Output</div>
            </div>
        
        </div>
        <div id="contenedorBody">
            <textarea id="htmlPanel" class="panel">Hola a todos!</textarea>
            <textarea id="cssPanel" class="panel oculto">p { color: green; }</textarea>
            <textarea id="javascriptPanel" class="panel oculto">alert("Hola a todos!");</textarea>

            <iframe id="outputPanel" class="panel"></iframe>
        </div>
        <script type="text/javascript">
            /*  La funcion hover puede manejar
                la entrada y salida del puntero a través
                de dos funciones */
            $(".boton").hover(function(){
                $(this).addClass("botonMarcado");
            },function(){
                $(this).removeClass("botonMarcado");
            });
            
            // Con toggleClass alternamos una clase
            $(".boton").click(function(){
                $(this).toggleClass("activo");
                $(this).removeClass("botonMarcado");
                
                /* 4º Video */
                var panelId = $(this).attr("id") + "Panel";
                $("#"+panelId).toggleClass("oculto");
                //$("#"+panelId).toggle();
                
                var numeroDePanelesActivos=4 - $('.oculto').length;
                $(".panel").width(($(window).width()/numeroDePanelesActivos)-10);
            });
            //
            $(".panel").height($(window).height() -$("#barra").height()-15);
            $(".panel").width($(window).width()/2 -10);
            $("iframe").contents().find("html").html($("#htmlPanel").val()); 
            //$("iframe").contents().find("html").html('My html');
            // Como deseamos reemplazar el contenido de todo el html por eso dentro de find no ponemos div sino html
            
           $("textarea").on('change keyup paste',function(){
            $("iframe").contents().find("html").html($("#htmlPanel").val());   
           }); 
            
            
        </script>
    </body>
</html>
