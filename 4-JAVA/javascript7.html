<html>

    <head>
        <meta charset = "UTF-8">
        <title>JavaScript</title>

        <style type="text/css">

            #entradaUsuario
            {
                width: 250px;
                height: 30px;
                font-size: 16px;
            }

            #textito
            {
                font-size: 20px;
                color: rgb(45, 27, 97);
            }

        </style>



    </head>

    <body>
        
        <input id="entradaUsuario" type="text" placeholder="Ingrese tu nombre de usuario">
        <p id="textito">Inicia secion</p>   
        <button id="mostrarMensaje">Login</button>

        
        <script type="text/javascript">
            
            document.getElementById("mostrarMensaje").onclick = function()
            {
                var entradaTexto = "";
                entradaTexto = document.getElementById("entradaUsuario").value;
                document.getElementById("textito").innerHTML = "Bienvenido "+entradaTexto;
            }
        
        
        
        </script>
    
    </body>







</html>
